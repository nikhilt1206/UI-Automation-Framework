name: UI Automation Framework Workflow

on:
  schedule:
    - cron: 30 23 * * *
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
        
    - name: Running UI Automation Framework with Maven
      run: mvn test -Dbrowser=chrome -DisLambdaTest=true -DisHeadless=fasle -X

    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test logs
        path: logs/

    - name: Upload Screenshot as Artifacts
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: screenshots
        path: screenshots/

    - name: Upload HTML Reports as Artifacts
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: html-report
        path: report.html

    - name: Test Execution Status 
      if: always()
      run: echo "Test Execution Completed"

    - name: Copy Report to gh-pages Folder
      if: always()

      run: 
        mkdir -p public/extent-reports
        cp -R report.html public/extent-reports/
        cp -R screenshots/ public/extent-reports/screenshots/
        ls -l

    - name: Deploy
      if: always()
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        folder: public/extent-reports/
        token: ${{ secrets.PAT1206 }}
        clean: true
      
